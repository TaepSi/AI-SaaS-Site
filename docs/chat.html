<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat — Чат</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="icon"
        href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🤖</text></svg>'>
</head>
<body class="chat-body">
    <div class="bg-blur bg-1"></div>
    <div class="bg-blur bg-2"></div>

    <header class="header">
        <div class="logo neon-text">AI Chat</div>

        <button class="burger" id="burgerBtn">
            ☰
        </button>

        <nav class="nav" id="navMenu">
            <a href="chat.html" class="active">Чат</a>
            <a href="dashboard.html">Личный кабинет</a>
            <button class="logout-btn" onclick="logout()">
                Выйти
            </button>
        </nav>
    </header>

    <main class="chat-container fade-in">
        <div id="messages" class="messages"></div>

        <div class="chat-input-area">
            <textarea
                id="messageInput"
                placeholder="Напишите сообщение..."
            ></textarea>

            <button id="sendBtn" class="btn-primary">
                Отправить
            </button>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="chat.js"></script>
</body>
</html>
